server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:event_gateway;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect  # Clean way for Spring Boot 3
  h2:
    console:
      enabled: true
      path: /h2-console

account-service:
  base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8084}
  connect-timeout-ms: 2000
  read-timeout-ms: 3000

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
  retry:
    instances:
      accountService:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.eventledger: INFO
