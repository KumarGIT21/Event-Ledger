server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: account-service

  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect  # Clean way for Spring Boot 3
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.eventledger: INFO
